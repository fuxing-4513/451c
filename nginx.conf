# 451C.com Nginx 配置
# 适用于 www.451c.com

server {
    listen 80;
    server_name www.451c.com 451c.com;

    # 强制 HTTPS（如果有证书）
    # return 301 https://$server_name$request_uri;
    # }

# server {
    # listen 443 ssl http2;
    # server_name www.451c.com 451c.com;

    # ssl_certificate /path/to/ssl/fullchain.pem;
    # ssl_certificate_key /path/to/ssl/privkey.pem;

    root /var/www/451c;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # 静态资源缓存（7天）
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 根路径
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # robots.txt
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # 日志
    access_log /var/log/nginx/451c-access.log;
    error_log /var/log/nginx/451c-error.log warn;
}
